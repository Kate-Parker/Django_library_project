<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* Force Django fields to take full width and match registration style */
        input, input[type="password"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container vh-100 d-flex flex-column justify-content-center">
        <div class="row justify-content-center">
            <!-- Matching the col-lg-4 width from registration -->
            <div class="col-11 col-md-6 col-lg-4">
                
                <form method="POST" action="{% url 'login' %}" class="card shadow p-4">
                    <h2 class="text-center mb-4">LOGIN</h2>
                    <div class="card-body p-0">
                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-user me-2 text-success"></i>{{ form.username.label }}
                            </label>
                            {{ form.username }}
                            <div class="text-danger small">{{ form.username.errors }}</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fa-solid fa-lock me-2 text-success"></i>{{ form.password.label }}
                            </label>
                            {{ form.password }}
                            <div class="text-danger small">{{ form.password.errors }}</div>
                        </div>
                       
                        <!-- Login Button -->
                        <div class="text-center d-grid">
                            <input type="submit" value="Login" class="btn btn-success py-2 fw-bold">
                        </div>
                    </div>
                </form>

                <!-- Signup Link -->
                <div class="text-center mt-3">
                    <p class="text-muted">Don't have an account? 
                        <a href="{% url 'signup' %}" class="text-success text-decoration-none fw-bold">Sign Up</a>
                    </p>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
